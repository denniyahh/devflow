version:
  scheme: semver
  file: Cargo.toml
  field: workspace.package.version
  build_number: git
automation:
  auto_branch: true
  auto_verify: true
  auto_docs: true
  auto_version: patch
  auto_ship: false
  auto_cleanup: true
git_flow:
  main: main
  develop: develop
  feature_prefix: feature/
