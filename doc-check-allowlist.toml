# Deterministic doc-check exceptions. Every entry must include a non-empty
# reason; the cargo tests reject unexplained exceptions.
[[exceptions]]
kind = "docs_to_source"
token = "--image"
reason = "Distrobox option in contributor setup; not a DevFlow CLI flag."

